# ~/.config/starship.toml
# Activate in ~/.bashrc: eval "$(starship init bash)"

"$schema" = "https://starship.rs/config-schema.json"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

add_newline = true

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

# ── User / host (only shown over SSH) ─────────────────────────────────────────
[username]
show_always = false
format      = "[$user]($style)@"
style_user  = "bold green"
style_root  = "bold red"

[hostname]
ssh_only = true
format   = "[$hostname]($style):"
style    = "bold green"

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
truncation_length   = 3
truncate_to_repo    = true
style               = "bold blue"
read_only           = " 󰌾"

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
format = "[$symbol$branch]($style) "
style  = "bold yellow"
symbol = " "

[git_status]
format    = '([$all_status$ahead_behind]($style) )'
style     = "bold red"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed   = "\\$"
modified  = "!"
staged    = "+"
renamed   = "»"
deleted   = "✘"

# ── Command duration ──────────────────────────────────────────────────────────
[cmd_duration]
min_time          = 2000
format            = "[ $duration]($style) "
style             = "bold yellow"
show_milliseconds = false

# ── Language contexts (shown only when relevant files are present) ─────────────
[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "

[nodejs]
format = "[$symbol($version )]($style)"
symbol = " "

[rust]
format = "[$symbol($version )]($style)"
symbol = " "

[golang]
format = "[$symbol($version )]($style)"
symbol = " "

# ── Disabled (add back as needed) ─────────────────────────────────────────────
[package]
disabled = true
